<title>Smite 2 Codex</title>
<style>
  /* ============ TOKENS — committed dark "arcane HUD" world ============ */
  :root{
    --void:#0b0d17;
    --void-2:#0e1120;
    --panel:#151a2e;
    --panel-2:#1b2138;
    --panel-3:#232a45;
    --line:#2b3357;
    --line-soft:#222a48;
    --ink:#eae9f5;
    --ink-dim:#9aa0c0;
    --ink-faint:#6b7099;
    --gold:#e7c274;
    --gold-deep:#c79a45;
    --gold-glow:rgba(231,194,116,.15);
    /* role hues */
    --mid:#b581ff;
    --carry:#ffb020;
    --support:#38bdf8;
    --solo:#f2545b;
    --jungle:#4ade80;
    --good:#4ade80;
    --warn:#ffb020;
    --radius:14px;
    --radius-sm:10px;
    --shadow:0 10px 30px -12px rgba(0,0,0,.7);
    --sans:"Segoe UI",Roboto,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a1f3a 0%, transparent 60%),
      radial-gradient(900px 500px at 90% 10%, rgba(181,129,255,.08) 0%, transparent 55%),
      var(--void);
    background-attachment:fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 14px 120px}

  /* ============ HEADER ============ */
  header{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(180deg, rgba(11,13,23,.96) 60%, rgba(11,13,23,.75) 100%);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line-soft);
  }
  .head-inner{max-width:760px;margin:0 auto;padding:12px 14px 10px}
  .brand{display:flex;align-items:center;gap:11px}
  .sigil{
    width:38px;height:38px;border-radius:10px;flex:none;
    display:grid;place-items:center;
    background:radial-gradient(circle at 35% 30%, #2a3157, #12162a);
    border:1px solid var(--gold-deep);
    box-shadow:0 0 18px var(--gold-glow), inset 0 0 12px rgba(0,0,0,.5);
    color:var(--gold);font-weight:800;font-size:19px;
  }
  .brand h1{
    font-size:16px;margin:0;letter-spacing:.16em;text-transform:uppercase;font-weight:800;
    background:linear-gradient(90deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .brand p{margin:1px 0 0;font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-faint)}

  /* tabs */
  nav.tabs{display:flex;gap:6px;margin-top:11px}
  nav.tabs button{
    flex:1;appearance:none;border:1px solid transparent;cursor:pointer;
    background:var(--panel);color:var(--ink-dim);
    padding:9px 6px;border-radius:10px;font-size:12px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;font-family:inherit;
    transition:.18s;display:flex;align-items:center;justify-content:center;gap:6px;
  }
  nav.tabs button .tcount{font-size:10px;color:var(--ink-faint);font-weight:600}
  nav.tabs button[aria-selected="true"]{
    color:var(--ink);border-color:var(--gold-deep);
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    box-shadow:0 0 0 1px rgba(231,194,116,.12), 0 6px 16px -10px rgba(0,0,0,.8);
  }

  /* ============ CONTROLS ============ */
  .controls{margin-top:16px;display:flex;flex-direction:column;gap:11px}
  .search{position:relative}
  .search input{
    width:100%;padding:12px 14px 12px 40px;border-radius:12px;font-size:15px;
    background:var(--panel);border:1px solid var(--line);color:var(--ink);font-family:inherit;
    outline:none;transition:.18s;
  }
  .search input:focus{border-color:var(--gold-deep);box-shadow:0 0 0 3px var(--gold-glow)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-faint)}

  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-ms-overflow-style:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:none;appearance:none;cursor:pointer;font-family:inherit;
    background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);
    padding:8px 13px;border-radius:999px;font-size:12.5px;font-weight:700;letter-spacing:.02em;
    display:flex;align-items:center;gap:7px;transition:.16s;white-space:nowrap;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .chip[aria-pressed="true"]{color:#0b0d17;border-color:transparent}
  .chip[data-role="All"][aria-pressed="true"]{background:var(--gold);color:#241a06}
  .chip[data-role="Mid"][aria-pressed="true"]{background:var(--mid)}
  .chip[data-role="Carry"][aria-pressed="true"]{background:var(--carry)}
  .chip[data-role="Support"][aria-pressed="true"]{background:var(--support)}
  .chip[data-role="Solo"][aria-pressed="true"]{background:var(--solo);color:#fff}
  .chip[data-role="Jungle"][aria-pressed="true"]{background:var(--jungle)}
  .chip.cat[aria-pressed="true"]{background:var(--gold);color:#241a06}
  .sortsel{appearance:none;-webkit-appearance:none;cursor:pointer;font-family:inherit;background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);padding:8px 26px 8px 12px;border-radius:999px;font-size:12.5px;font-weight:700;outline:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%238b8fa8' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center}
  .sortsel:focus{border-color:var(--gold-deep)}

  .row-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .result-meta{font-size:11.5px;color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase;font-weight:600}

  /* ============ GOD GRID ============ */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-top:14px}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
  .card{
    position:relative;cursor:pointer;text-align:left;font-family:inherit;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line-soft);border-radius:var(--radius);
    padding:13px 12px 12px;overflow:hidden;transition:.16s;color:var(--ink);
    display:flex;flex-direction:column;gap:9px;min-height:118px;
  }
  .card:active{transform:scale(.975)}
  .card::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--rc,var(--gold))}
  .card .toprow{display:flex;align-items:center;gap:10px}
  .medallion{
    width:42px;height:42px;border-radius:11px;flex:none;display:grid;place-items:center;position:relative;overflow:hidden;
    font-weight:800;font-size:15px;letter-spacing:.02em;color:#0b0d17;
    background:linear-gradient(145deg,var(--rc,var(--gold)),color-mix(in srgb,var(--rc,var(--gold)) 55%, #000));
    box-shadow:inset 0 0 10px rgba(0,0,0,.35);
  }
  .medallion .ini{position:relative;z-index:1}
  .godimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;display:block}
  .emblem-glyph{position:absolute;bottom:-13%;right:-11%;width:70%;height:70%;opacity:.26;color:#06101f;z-index:0}
  .emblem-glyph.stroke{fill:none;stroke:#06101f;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
  .card .nm{font-weight:700;font-size:14px;line-height:1.15}
  .card .sub{font-size:10.5px;color:var(--ink-faint);letter-spacing:.03em;margin-top:2px}
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto}
  .badge{

  .stat .v{font-size:26px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
  .stat .v small{font-size:13px;color:var(--ink-faint);font-weight:600}
  .section-title{margin:26px 0 4px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);font-weight:700}

  .btn.gold{background:var(--gold);color:#241a06;border-color:transparent}

  /* ============ DETAIL SHEET ============ */

  .view{display:none}

function emblem(cls){
  var g=CLASS_GLYPH[cls]||CLASS_GLYPH.Warrior;

function relTime(ts){
  if(!ts)return "";
  var s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return "just now";
  var m=Math.floor(s/60);if(m<60)return m+"m ago";
  var h=Math.floor(m/60);if(h<24)return h+"h ago";
  var d=Math.floor(h/24);if(d<30)return d+"d ago";
  var mo=Math.floor(d/30);if(mo<12)return mo+"mo ago";
  return Math.floor(mo/12)+"y ago";
}

      '<div class="toggle-line"><div class="tl-txt"><strong>Played this god</strong><span>'+(r.playedAt?"Last played "+relTime(r.playedAt):"Mark gods you\'ve taken into a match")+'</span></div>'+
      '<label class="switch"><input type="checkbox" id="playedTog"'+(r.played?" checked":"")+'><span class="sl"></span></label></div>'+
      '<h3 style="margin-top:18px">My notes</h3>'+
      '<textarea class="notes" id="notes" placeholder="Combos, build ideas, what to practice…">'+esc(r.notes)+'</textarea>'+
      '<h3 style="margin-top:18px">Matchup &amp; counter notes</h3>'+
      '<textarea class="notes" id="mnotes" placeholder="Who beats them, who they beat, what to watch for…">'+esc(r.mnotes||"")+'</textarea>'+
    '</div>'+
    // abilities
    '<div class="dt-block">'+
      '<div class="row-between" style="margin-bottom:12px"><h3 style="margin:0">Abilities</h3><button class="mini" id="abilEdit"></button></div>'+
      '<div class="abil" id="abilList"></div>'+
    '</div>'+
    // reset
    '<div style="padding:16px 0 4px;text-align:center;border-bottom:none">'+
      '<button class="mini" id="resetGod" style="color:var(--solo)">↺ Reset this god\'s tracking</button>'+
    '</div>';

  // familiarity segmented
  var seg=$("#segFam");
  FAM.forEach(function(f,i){
    var b=el("button");b.setAttribute("data-f",i);b.setAttribute("aria-pressed",r.fam===i);
    b.innerHTML='<span class="si">'+f.si+'</span>'+f.n;
    b.onclick=function(){r.fam=i;save();Array.prototype.forEach.call(seg.children,function(x,xi){x.setAttribute("aria-pressed",xi===i);});refreshBadges(g[0]);};
    seg.appendChild(b);
  });
  $("#ownedTog").onchange=function(){r.owned=this.checked;save();refreshBadges(g[0]);};
  $("#playedTog").onchange=function(){r.played=this.checked;if(this.checked)r.playedAt=Date.now();save();refreshBadges(g[0]);};
  $("#notes").oninput=function(){r.notes=this.value;save();};
  $("#mnotes").oninput=function(){r.mnotes=this.value;save();};
  $("#abilEdit").onclick=function(){editAbil=!editAbil;renderAbil(g);};
  $("#resetGod").onclick=function(){
    if(window.confirm("Reset all your tracking for "+g[0]+"? (owned, played, familiarity, notes and ability edits)")){
      delete store.gods[g[0]];save();refreshBadges(g[0]);toast(g[0]+" reset");openGod(g);
    }
  };
  $("#closeSheet").onclick=closeSheet;
  renderAbil(g);
  openSheet();
}
function statsToText(a){
  var lines=(a.s||[]).map(function(r){return r[0]+": "+r[1];});
  if(a.notes)lines.push("Notes: "+a.notes);
  return lines.join("\n");
}
function textToStats(txt){
  var s=[],notes="";
  (txt||"").split("\n").forEach(function(line){
    line=line.trim();if(!line)return;
    var idx=line.indexOf(":");
    if(idx<0){s.push(["",line]);return;}
    var k=line.slice(0,idx).trim(),v=line.slice(idx+1).trim();
    if(k.toLowerCase()==="notes")notes=notes?notes+" "+v:v;
    else s.push([k,v]);
  });
  return {s:s,notes:notes};
}
function renderAbil(g){
  var box=$("#abilList");box.innerHTML="";
  $("#abilEdit").textContent=editAbil?"✓ Done":"✎ Edit";
  var data=abilOf(g);
  var working=data?data.rich.map(function(a){return {n:a.n||"",d:a.d||"",s:(a.s||[]).map(function(x){return[x[0],x[1]];}),notes:a.notes||""};})
                   :[0,1,2,3,4].map(function(){return {n:"",d:"",s:[],notes:""};});
  while(working.length<5)working.push({n:"",d:"",s:[],notes:""});

  // source hint (only when not full and not user-edited)
  var hint=$("#abilHint");
  if(hint)hint.remove();
  if(data&&data.src==="basic"&&!editAbil){
    var h=el("div","");h.id="abilHint";
    h.style.cssText="font-size:11.5px;color:var(--ink-faint);margin:-4px 0 12px;line-height:1.5";
    h.innerHTML="⚡ Summary shown. Full official stats for this god aren't loaded yet — tap <b style='color:var(--gold-deep)'>Edit</b> to add them yourself.";
    box.parentNode.insertBefore(h,box);
  }

  working.forEach(function(a,i){
    var row=el("div","ab");
    var key='<div class="key">'+ABIL_KEYS[i]+'</div>';
    if(editAbil){
      row.innerHTML=key+'<div class="abtxt">'+
        '<input class="ab-input" data-i="'+i+'" data-k="n" placeholder="'+ABIL_SLOTS[i]+' ability name" value="'+esc(a.n)+'">'+
        '<textarea class="ab-input desc" data-i="'+i+'" data-k="d" placeholder="What it does…">'+esc(a.d)+'</textarea>'+
        '<textarea class="ab-input desc" data-i="'+i+'" data-k="s" placeholder="Stats, one per line — e.g.\nDamage: 50 / 95 / 140\nCooldown: 14s\nNotes: ...">'+esc(statsToText(a))+'</textarea></div>';
    }else{
      var stats=a.s.length?'<div class="stat-grid">'+a.s.map(function(r){
        return '<div class="srow"><span class="sk">'+esc(r[0])+'</span><span class="sv">'+esc(r[1])+'</span></div>';
      }).join("")+'</div>':'';
      var notes=a.notes?'<div class="abnotes">'+esc(a.notes)+'</div>':'';
      row.innerHTML=key+'<div class="abtxt"><div class="abname">'+(esc(a.n)||'<span style="color:var(--ink-faint)">'+ABIL_SLOTS[i]+'</span>')+'</div>'+
        (a.d?'<div class="abdesc">'+esc(a.d)+'</div>':'')+stats+notes+'</div>';
    }
    box.appendChild(row);
  });

  if(editAbil){
    Array.prototype.forEach.call(box.querySelectorAll(".ab-input"),function(inp){
      inp.oninput=function(){
        var i=+inp.getAttribute("data-i"),k=inp.getAttribute("data-k");
        if(k==="s"){var parsed=textToStats(inp.value);working[i].s=parsed.s;working[i].notes=parsed.notes;}
        else working[i][k]=inp.value;
        var r=rec(g[0]);
        r.abil=working.map(function(x){return {n:x.n,d:x.d,s:x.s,notes:x.notes};});
        save();
      };
    });
  }
}
function refreshBadges(name){renderGods();if(curTab==="tracked")renderTracked();updateCounts();}

function openSheet(){$("#scrim").classList.add("open");$("#sheet").classList.add("open");document.body.style.overflow="hidden";}
function closeSheet(){$("#scrim").classList.remove("open");$("#sheet").classList.remove("open");document.body.style.overflow="";}

/* ================= ITEMS VIEW ================= */
function buildItemChips(){
  var box=$("#itemChips");box.innerHTML="";
  var cats=["All","Starter","Offense","Defense","Hybrid","Relic","Curio","Consumable","God-Specific"];
  cats.forEach(function(c){
    var b=el("button","chip cat");b.setAttribute("aria-pressed",c===iState.cat);
    b.textContent=c==="All"?"All items":c;
    b.onclick=function(){iState.cat=c;Array.prototype.forEach.call(box.children,function(x){x.setAttribute("aria-pressed",x.textContent===(c==="All"?"All items":c));});renderItems();};
    box.appendChild(b);
  });
}
function buildItemAttrChips(){
  var box=$("#itemAttrChips");box.innerHTML="";
  var attrs=[["All","All stats"],["Strength","⚔ Strength"],["Intelligence","✨ Intelligence"],["Defense","🛡 Defense"],["Utility","✦ Utility"]];
  attrs.forEach(function(a){
    var b=el("button","chip cat");b.setAttribute("aria-pressed",a[0]===iState.attr);
    b.textContent=a[1];
    b.onclick=function(){iState.attr=a[0];Array.prototype.forEach.call(box.children,function(x){x.setAttribute("aria-pressed",x.textContent===a[1]);});renderItems();};
    box.appendChild(b);
  });
}
function renderItems(){
  var list=$("#itemList");list.innerHTML="";
  var q=iState.q.toLowerCase();
  var res=ITEMS.filter(function(it){
    if(iState.cat!=="All"&&it[1]!==iState.cat)return false;
    if(!itemAttrMatch(it))return false;
    if(q){
      var hit=itemSearchText(it).indexOf(q)>=0;
      if(!hit){var n=store.items[it[0]];if(n&&n.toLowerCase().indexOf(q)>=0)hit=true;}
      if(!hit)return false;
    }
    return true;
  });
  res.forEach(function(it){
    var row=el("div","item");
    var d=ITEM_DESC[it[0]];
    var note=store.items[it[0]];
    var sub=d?d.passive:(note?note:it[1]);
    row.innerHTML=
      '<div class="iico">'+itemMed(it)+'</div>'+
      '<div style="min-width:0"><div class="inm">'+esc(it[0])+'</div><div class="idesc">'+esc(sub)+'</div></div>'+
      '<div class="cost'+(it[2]===0?" free":"")+'">'+(it[2]===0?"Free":'<span style="opacity:.7">◈</span>'+it[2].toLocaleString())+'</div>';
    row.onclick=function(){openItem(it);};
    list.appendChild(row);
  });
  if(!res.length)list.appendChild(emptyState("No items match."));
  $("#itemCount").textContent=res.length+" of "+ITEMS.length+" items";
}
function openItem(it){
  var d=ITEM_DESC[it[0]];
  var note=store.items[it[0]]||"";
  var s=$("#sheetIn");
  var statsHTML="";
  if(d&&d.stats&&d.stats.length){
    statsHTML='<div class="dt-block"><h3>Stats</h3><div class="kv">'+d.stats.map(function(r){
      return '<div class="row"><span class="k">'+esc(r[0])+'</span><span class="v">'+esc(r[1])+'</span></div>';
    }).join("")+'<div class="row"><span class="k">Cost</span><span class="v" style="color:var(--gold)">'+(it[2]===0?"Free":"◈ "+it[2].toLocaleString())+'</span></div></div></div>';
  }else{
    statsHTML='<div class="dt-block"><h3>Cost</h3><div style="font-weight:700;color:var(--gold);font-size:16px">'+(it[2]===0?"Free":"◈ "+it[2].toLocaleString()+" gold")+'</div></div>';
  }
  var passHTML=d
    ? '<div class="dt-block"><h3>Passive / Effect</h3><div class="abdesc" style="font-size:14px;color:var(--ink)">'+esc(d.passive)+'</div></div>'
    : '<div class="dt-block"><h3>Passive / Effect</h3><div class="abil-empty" style="border:none;padding:0;text-align:left;color:var(--ink-faint)">No effect details seeded for this item yet — add your own below.</div></div>';
  s.innerHTML=
    '<div class="dt-head">'+
      '<div class="dt-med" style="--rc:var(--gold);font-size:26px;color:#241a06">'+itemMed(it)+'</div>'+
      '<div style="flex:1;min-width:0"><h2 style="font-size:20px">'+esc(it[0])+'</h2><div class="dt-tags"><span class="badge">'+it[1]+'</span></div></div>'+
      '<button class="close-x" id="closeSheet">✕</button>'+
    '</div>'+
    statsHTML+passHTML+
    '<div class="dt-block" style="border-bottom:none"><h3>My notes</h3>'+
      '<textarea class="notes" id="itemNotes" placeholder="Build order, who to buy it on, situational notes…">'+esc(note)+'</textarea></div>';
  $("#closeSheet").onclick=closeSheet;
  $("#itemNotes").oninput=function(){if(this.value)store.items[it[0]]=this.value;else delete store.items[it[0]];save();};
  openSheet();
}

/* ================= TRACKED VIEW ================= */
function renderTracked(){
  var tracked=GODS.filter(godTracked);
  var owned=GODS.filter(function(g){var r=store.gods[g[0]];return r&&r.owned;}).length;
  var played=GODS.filter(function(g){var r=store.gods[g[0]];return r&&r.played;}).length;
  var mastered=tracked.filter(function(g){return store.gods[g[0]].fam===3;}).length;
  var sc=$("#statCards");sc.innerHTML="";
  [["Owned",owned,GODS.length],["Played",played,GODS.length],["Mastered",mastered,null],["Tracked",tracked.length,GODS.length]].forEach(function(s){
    var d=el("div","stat");
    d.innerHTML='<div class="k">'+s[0]+'</div><div class="v">'+s[1]+(s[2]?' <small>/ '+s[2]+'</small>':'')+'</div>';
    sc.appendChild(d);
  });
  // fam breakdown
  var bars=$("#famBars");bars.innerHTML="";
  var counts=[0,0,0,0];GODS.forEach(function(g){var r=store.gods[g[0]];counts[r?r.fam:0]++;});
  var max=Math.max.apply(null,counts)||1;
  FAM.forEach(function(f,i){
    var b=el("div","fam-bar");
    b.innerHTML='<span class="lbl">'+f.si+' '+f.n+'</span><div class="track"><div class="fill" style="width:'+(counts[i]/max*100)+'%;background:'+f.c+'"></div></div><span class="n">'+counts[i]+'</span>';
    bars.appendChild(b);
  });
  // tracked grid
  var grid=$("#trackedGrid");grid.innerHTML="";
  if(!tracked.length){grid.appendChild(emptyState("No gods tracked yet. Open a god and set your familiarity or mark it played."));}
  else{
    tracked.sort(function(a,b){var ra=store.gods[a[0]],rb=store.gods[b[0]];if(rb.fam!==ra.fam)return rb.fam-ra.fam;return a[0]<b[0]?-1:1;});
    tracked.forEach(function(g){grid.appendChild(godCard(g));});
  }
}

/* ================= TABS ================= */
var curTab="gods";
function setTab(t){
  curTab=t;
  Array.prototype.forEach.call(document.querySelectorAll("nav.tabs button"),function(b){b.setAttribute("aria-selected",b.getAttribute("data-tab")===t);});
  ["gods","items","tracked"].forEach(function(v){$("#view-"+v).classList.toggle("active",v===t);});
  if(t==="tracked")renderTracked();
  window.scrollTo(0,0);
}
function updateCounts(){
  var tracked=GODS.filter(godTracked).length;
  $("#tc-gods").textContent=GODS.length;
  $("#tc-items").textContent=ITEMS.length;
  $("#godSearch").setAttribute("placeholder","Search "+GODS.length+" gods & abilities…");
  $("#tc-tracked").textContent=tracked||"";
}

/* ================= TOAST ================= */
var toastT;
function toast(msg){var t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove("show");},2200);}

/* ================= BACKUP ================= */
function downloadBackup(){
  try{
    var blob=new Blob([JSON.stringify(store)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var d=new Date(),p=function(n){return (n<10?"0":"")+n;};
    var a=document.createElement("a");
    a.href=url;a.download="smite2-codex-backup-"+d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1500);
    toast("Backup downloaded");
  }catch(e){doExport();}
}
function restoreFromFile(file){
  if(!file)return;
  var rd=new FileReader();
  rd.onload=function(){
    try{var d=JSON.parse(rd.result);if(!d.gods)throw 0;if(!d.items)d.items={};store=d;save();refreshAll();toast("Progress restored");}
    catch(e){toast("That file wasn't a valid backup");}
  };
  rd.onerror=function(){toast("Couldn't read that file");};
  rd.readAsText(file);
}
function doExport(){
  var code=JSON.stringify(store);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(function(){toast("Progress copied to clipboard");},function(){promptExport(code);});
  }else promptExport(code);
}
function promptExport(code){window.prompt("Copy this backup code:",code);}
function doImport(){
  var code=window.prompt("Paste your backup code:");
  if(!code)return;
  try{var d=JSON.parse(code);if(!d.gods)throw 0;if(!d.items)d.items={};store=d;save();refreshAll();toast("Progress restored");}
  catch(e){toast("That code wasn't valid");}
}
function doReset(){
  if(window.confirm("Erase all tracking data? This can't be undone.")){store={gods:{},items:{}};save();refreshAll();toast("All progress reset");}
}
function refreshAll(){renderGods();renderItems();renderTracked();updateCounts();}

/* ================= WIRE UP ================= */
buildRoleChips();buildClassChips();buildItemChips();buildItemAttrChips();
renderGods();renderItems();updateCounts();
$("#godSearch").addEventListener("input",function(){gState.q=this.value;renderGods();});
$("#itemSearch").addEventListener("input",function(){iState.q=this.value;renderItems();});
$("#playedFilter").addEventListener("click",function(){gState.playedOnly=!gState.playedOnly;this.setAttribute("aria-pressed",gState.playedOnly);this.style.opacity=gState.playedOnly?"1":"";renderGods();});
$("#ownedFilter").addEventListener("click",function(){gState.ownedOnly=!gState.ownedOnly;this.setAttribute("aria-pressed",gState.ownedOnly);this.style.opacity=gState.ownedOnly?"1":"";renderGods();});
$("#practiceBtn").addEventListener("click",function(){
  var pool=GODS.filter(function(g){return gState.role==="All"||g[3]===gState.role||g[4]===gState.role;});
  if(!pool.length)return;
  // weight toward lower familiarity: untried x4, learning x3, comfortable x2, mastered x1
  var bag=[];pool.forEach(function(g){var f=(store.gods[g[0]]&&store.gods[g[0]].fam)||0;var w=4-f;for(var i=0;i<w;i++)bag.push(g);});
  openGod(bag[Math.floor(Math.random()*bag.length)]);
});
Array.prototype.forEach.call(document.querySelectorAll("nav.tabs button"),function(b){b.addEventListener("click",function(){setTab(b.getAttribute("data-tab"));});});
$("#scrim").addEventListener("click",closeSheet);
$("#godSort").addEventListener("change",function(){gState.sort=this.value;renderGods();});
$("#downloadBtn").addEventListener("click",downloadBackup);
$("#restoreBtn").addEventListener("click",function(){$("#importFile").click();});
$("#importFile").addEventListener("change",function(){if(this.files&&this.files[0])restoreFromFile(this.files[0]);this.value="";});
$("#exportBtn").addEventListener("click",doExport);
$("#resetBtn").addEventListener("click",doReset);
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeSheet();});

})();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').then(function(reg){
      function notify(worker){
        if(document.getElementById('sw-update'))return;
        var b=document.createElement('div');
        b.id='sw-update';b.setAttribute('role','status');
        b.style.cssText='position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:12px;max-width:calc(100% - 28px);padding:11px 13px 11px 16px;border-radius:12px;font:600 13px/1.3 "Segoe UI",Roboto,system-ui,sans-serif;color:#eae9f5;background:#1b2138;border:1px solid #2b3357;box-shadow:0 10px 30px -12px rgba(0,0,0,.7)';
        b.appendChild(document.createTextNode('New version available'));
        var btn=document.createElement('button');
        btn.textContent='Refresh';
        btn.style.cssText='appearance:none;cursor:pointer;font:700 13px/1 "Segoe UI",Roboto,system-ui,sans-serif;color:#241a06;background:#e7c274;border:none;padding:8px 14px;border-radius:8px';
        btn.onclick=function(){btn.disabled=true;btn.textContent='Updating…';worker.postMessage('SKIP_WAITING');};
        b.appendChild(btn);
        document.body.appendChild(b);
      }
      if(reg.waiting && navigator.serviceWorker.controller)notify(reg.waiting);
      reg.addEventListener('updatefound',function(){
        var nw=reg.installing;if(!nw)return;
        nw.addEventListener('statechange',function(){
          if(nw.state==='installed' && navigator.serviceWorker.controller)notify(nw);
        });
      });
    }).catch(function(){});
    var refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',function(){
      if(refreshing)return;refreshing=true;window.location.reload();
    });
  });
}
</script>
